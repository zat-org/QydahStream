name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WebSocketLinkBaloot: ${{ secrets.WEBSOCKET_LINK_BALOOT }}
          WebSocketLinkHand: ${{ secrets.WEBSOCKET_LINK_HAND }}
          NUXT_PUBLIC_ERROR_REPORT_URL: ${{ secrets.NUXT_PUBLIC_ERROR_REPORT_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-build
          path: .output/public
          retention-days: 7
