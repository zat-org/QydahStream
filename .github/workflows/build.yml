name: Build

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'ci' || (github.ref_name == 'main' && 'production' || 'staging') }}

    env:
      APP_ENV: ${{ github.event_name == 'pull_request' && 'preview' || (github.ref_name == 'main' && 'production' || 'staging') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          {
            echo "WebSocketLinkBaloot=${{ secrets.WEBSOCKET_LINK_BALOOT }}"
            echo "WebSocketLinkHand=${{ secrets.WEBSOCKET_LINK_HAND }}"
            echo "NUXT_PUBLIC_APP_ENV=${{ env.APP_ENV }}"
            echo "NUXT_PUBLIC_ERROR_REPORT_URL=${{ secrets.NUXT_PUBLIC_ERROR_REPORT_URL }}"
            echo "apiKey=${{ secrets.FIREBASE_API_KEY }}"
            echo "authDomain=${{ secrets.FIREBASE_AUTH_DOMAIN }}"
            echo "projectId=${{ secrets.FIREBASE_PROJECT_ID }}"
            echo "appId=${{ secrets.FIREBASE_APP_ID }}"
            echo "databaseURL=${{ secrets.FIREBASE_DATABASE_URL }}"
            echo "storageBucket=${{ secrets.FIREBASE_STORAGE_BUCKET }}"
            echo "messagingSenderId=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"
            echo "loginPassword=${{ secrets.FIREBASE_LOGIN_PASSWORD }}"
          } > .env

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-build-${{ env.APP_ENV }}
          path: .output/public
          retention-days: 7
